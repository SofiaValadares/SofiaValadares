name: Update Profile README

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-profile:
    runs-on: ubuntu-latest
    env:
      HIGHLIGHT_LANGS: 'Java,TypeScript,JavaScript,Kotlin,Python'
      IGNORE_LANGS: 'JSON,HTML,CSS,SCSS,Sass,Markdown,SVG,XML,YAML,TOML,CSV,Text,Properties'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq cloc locales
          sudo locale-gen en_US.UTF-8

      - name: Update profile stats HTML
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          export LC_ALL=en_US.UTF-8
          export LANG=en_US.UTF-8

          USER_JSON=$(curl -fsSL -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/users/${{ github.repository_owner }}")

          PUBLIC_REPOS=$(echo "$USER_JSON" | jq -r '.public_repos')
          FOLLOWERS=$(echo "$USER_JSON" | jq -r '.followers')

          GRAPHQL=$(curl -fsSL -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"query { user(login: \"'"${{ github.repository_owner }}"'\") { contributionsCollection { totalCommitContributions } } }"}' \
            https://api.github.com/graphql)

          CONTRIBUTIONS=$(echo "$GRAPHQL" | jq -r '.data.user.contributionsCollection.totalCommitContributions // 0')

          STATS_BLOCK=$(cat <<EOF
          <div class="readme-card">
            <p class="readme-card__title">GitHub em números</p>
            <table class="readme-stats-table">
              <tr>
                <td><div class="readme-stat"><span class="readme-stat__value">${CONTRIBUTIONS}</span><span class="readme-stat__label">Contribuições</span></div></td>
                <td><div class="readme-stat"><span class="readme-stat__value">${PUBLIC_REPOS}</span><span class="readme-stat__label">Repositórios</span></div></td>
              </tr>
              <tr>
                <td><div class="readme-stat"><span class="readme-stat__value">${FOLLOWERS}</span><span class="readme-stat__label">Seguidores</span></div></td>
                <td><div class="readme-stat"><span class="readme-stat__value">15</span><span class="readme-stat__label">Maior streak</span></div></td>
              </tr>
            </table>
          </div>
          EOF
          )

          echo "$STATS_BLOCK" > /tmp/profile-stats.html
          sed -i '/<!-- PROFILE-STATS START -->/,/<!-- PROFILE-STATS END -->/{
            //!d
            /<!-- PROFILE-STATS START -->/r /tmp/profile-stats.html
          }' README.md

      - name: Update lines of code HTML
        run: |
          set -euo pipefail
          export LC_ALL=en_US.UTF-8
          export LANG=en_US.UTF-8

          mkdir -p public-repos output
          cd public-repos

          page=1
          while :; do
            response=$(curl -fsSL "https://api.github.com/users/${{ github.repository_owner }}/repos?per_page=100&page=${page}&type=owner")
            count=$(echo "$response" | jq 'length')
            [ "$count" -eq 0 ] && break

            echo "$response" | jq -r '.[] | select(.fork == false) | .full_name' | while read -r REPO; do
              DEFAULT_BRANCH=$(curl -fsSL "https://api.github.com/repos/$REPO" | jq -r '.default_branch')
              git clone --quiet --branch "$DEFAULT_BRANCH" --single-branch --depth 1 \
                "https://github.com/${REPO}.git" "$(basename "$REPO")" || true
            done

            [ "$count" -lt 100 ] && break
            page=$((page + 1))
          done

          cloc . --json --report-file=../output/cloc-output.json --exclude-lang="${IGNORE_LANGS}"

          cd ..
          python3 <<'PY'
          import json, os

          with open("output/cloc-output.json") as f:
              data = json.load(f)

          highlight = [x.strip() for x in os.environ["HIGHLIGHT_LANGS"].split(",")]
          total = data.get("SUM", {}).get("code", 0) or 0
          rows = []
          others = 0

          for lang, info in data.items():
              if lang in ("header", "SUM"):
                  continue
              lines = info.get("code", 0)
              if lines <= 0:
                  continue
              if lang in highlight:
                  rows.append((lang, lines))
              else:
                  others += lines

          rows.sort(key=lambda item: item[1], reverse=True)
          if others > 0:
              rows.append(("Outros", others))

          def fmt(n: int) -> str:
              return f"{n:,}".replace(",", ".")

          parts = [
              '<div class="readme-card">',
              '  <p class="readme-card__title">Distribuição por linguagem</p>',
              '  <div class="readme-lang-list">',
          ]

          for lang, lines in rows:
              width = round((lines / total) * 100, 1) if total else 0
              label = "Outros" if lang == "Others" else lang
              parts.extend([
                  '    <div class="readme-lang">',
                  f'      <span class="readme-lang__name">{label}</span>',
                  '      <div class="readme-lang__track"><div class="readme-lang__fill" style="width:' + str(width) + '%"></div></div>',
                  f'      <span class="readme-lang__value">{fmt(lines)}</span>',
                  '    </div>',
              ])

          parts.extend([
              '  </div>',
              f'  <div class="readme-total">Total: <strong>{fmt(total)}</strong> linhas de código</div>',
              '</div>',
          ])

          with open("/tmp/languages-breakdown.html", "w") as f:
              f.write("\n".join(parts) + "\n")
          PY

          sed -i '/<!-- LANGUAGES BREAKDOWN START -->/,/<!-- LANGUAGES BREAKDOWN END -->/{
            //!d
            /<!-- LANGUAGES BREAKDOWN START -->/r /tmp/languages-breakdown.html
          }' README.md

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md output/cloc-output.json
          git diff --staged --quiet || git commit -m "chore: update profile HTML stats and LOC"
          git push origin HEAD:main
