name: Update Profile README

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-profile:
    runs-on: ubuntu-latest
    env:
      HIGHLIGHT_LANGS: 'Java,TypeScript,JavaScript,Kotlin,Python'
      IGNORE_LANGS: 'JSON,HTML,CSS,SCSS,Sass,Markdown,SVG,XML,YAML,TOML,CSV,Text,Properties'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq cloc locales
          sudo locale-gen en_US.UTF-8

      - name: Update lines of code
        run: |
          set -euo pipefail
          export LC_ALL=en_US.UTF-8
          export LANG=en_US.UTF-8

          mkdir -p public-repos output
          cd public-repos

          page=1
          while :; do
            response=$(curl -fsSL "https://api.github.com/users/${{ github.repository_owner }}/repos?per_page=100&page=${page}&type=owner")
            count=$(echo "$response" | jq 'length')
            [ "$count" -eq 0 ] && break

            echo "$response" | jq -r '.[] | select(.fork == false) | .full_name' | while read -r REPO; do
              DEFAULT_BRANCH=$(curl -fsSL "https://api.github.com/repos/$REPO" | jq -r '.default_branch')
              git clone --quiet --branch "$DEFAULT_BRANCH" --single-branch --depth 1 \
                "https://github.com/${REPO}.git" "$(basename "$REPO")" || true
            done

            [ "$count" -lt 100 ] && break
            page=$((page + 1))
          done

          cloc . --json --report-file=../output/cloc-output.json --exclude-lang="${IGNORE_LANGS}"

          cd ..
          python3 <<'PY'
          import json, os

          with open("output/cloc-output.json") as f:
              data = json.load(f)

          highlight = [x.strip() for x in os.environ["HIGHLIGHT_LANGS"].split(",")]
          total = data.get("SUM", {}).get("code", 0) or 0
          rows = []
          others = 0

          for lang, info in data.items():
              if lang in ("header", "SUM"):
                  continue
              lines = info.get("code", 0)
              if lines <= 0:
                  continue
              if lang in highlight:
                  rows.append((lang, lines))
              else:
                  others += lines

          rows.sort(key=lambda item: item[1], reverse=True)
          if others > 0:
              rows.append(("Outros", others))

          def fmt(n: int) -> str:
              return f"{n:,}".replace(",", ".")

          lines = [
              "```",
              "[ LANGUAGES BREAKDOWN ]",
              "",
          ]

          for lang, count in rows:
              lines.append(f"{lang:<12} --> {fmt(count)} lines")

          lines.extend([
              "",
              f"[ TOTAL LINES OF CODE: {fmt(total)} ]",
              "```",
          ])

          with open("/tmp/languages-breakdown.txt", "w") as f:
              f.write("\n".join(lines) + "\n")
          PY

          sed -i '/<!-- LANGUAGES BREAKDOWN START -->/,/<!-- LANGUAGES BREAKDOWN END -->/{
            //!d
            /<!-- LANGUAGES BREAKDOWN START -->/r /tmp/languages-breakdown.txt
          }' README.md

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md output/cloc-output.json
          git diff --staged --quiet || git commit -m "chore: update lines of code stats"
          git push origin HEAD:main
